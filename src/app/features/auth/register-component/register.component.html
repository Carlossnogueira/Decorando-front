<div class="container">
    <div class="form-container">
        <div class="form-header">
            <h1>Criar conta</h1>
            <p>Acompanhe suas compras pela sua conta</p>
        </div>

        <form class="form-body">
            <label for="username" >Nome:</label>
            <input type="text" class="form-body-input-error" id="username" name="username" placeholder="João da Silva" minlength="3" maxlength="50" class="form-body-input" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="exemplo@email.com" class="form-body-input" required>

            <label for="password">Senha:</label>
            <input type="password" id="password" name="password" placeholder="********" class="form-body-input" required>

            <label for="confirm-password">Confirmar Senha:</label>
            <input type="password" id="confirm-password" name="confirm-password" placeholder="********" class="form-body-input" required>

            <div class="form-footer">
                <button type="submit">Criar Conta</button>
                <P>Já possui uma conta? <a href="/login">Entre aqui</a></P>
            </div>
        </form>
    </div>
</div>
